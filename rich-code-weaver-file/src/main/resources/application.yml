spring:
  application:
    name: rich-code-weaver-file
  profiles:
    active: local

server:
  port: 8103
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
#      paths-to-match: '/**'
      packages-to-scan: com.rich.file.controller

# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# Spring Boot Admin Client 配置（默认关闭，需要时在 application-local.yml 中设置为 true）
spring.boot.admin.client.enabled: false

# actuator 端点配置
management:
  endpoints:
    web:
      exposure:
        # 暴露所有端点
        include: '*'
  endpoint:
    health:
      # 显示详细健康信息
      show-details: always