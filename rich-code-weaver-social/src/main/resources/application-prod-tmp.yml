# 生产配置 (使用时去除文件 “-tmp”后缀)

spring:
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/rich_code_weaver
    username: rich_code_weaver
    password: xxxxxx
  # redis
  data:
    redis:
      database: 5
      port: 6379
      host: 127.0.0.1
      password: xxxxxx
      # 连接超时时间
      timeout: 5000

# Dubbo
dubbo:
  registry:
    # nacos 注册中心启动地址
    address: nacos://xxxxxx:8848?username=nacos&password=nacos
    register-mode: interface
  protocol:
    name: tri
    port: 50056
  consumer:
    timeout: 60000
  provider:
    timeout: 60000
  # Dubbo QoS 配置
  application:
    qos-port: 33333

# Spring Boot Admin Client 配置
spring.boot.admin.client:
  # Spring Boot Admin Server 地址
  url: http://localhost:9001
  instance:
    # 服务实例名称
    name: ${spring.application.name}
    # 服务访问地址
    service-base-url: http://localhost:${server.port}