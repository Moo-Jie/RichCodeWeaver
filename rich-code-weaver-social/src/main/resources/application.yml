spring:
  application:
    name: rich-code-weaver-social
  # session 配置
  session:
    # session 30 天过期
    timeout: 2592000
  profiles:
    active: local
  # 允许 Bean 定义覆盖
  main:
    allow-bean-definition-overriding: true

server:
  port: 8106
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
#      paths-to-match: '/**'
      packages-to-scan: com.rich.social.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# actuator 端点配置
management:
  endpoints:
    web:
      exposure:
        # 暴露所有端点
        include: '*'
  endpoint:
    health:
      # 显示详细健康信息
      show-details: always