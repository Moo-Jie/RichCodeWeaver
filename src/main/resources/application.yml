spring:
  application:
    name: rich-code-weaver
  # session 配置
  session:
    # session 30 天过期
    timeout: 2592000
  profiles:
    active: local
  #    active: prod
  main:
    allow-bean-definition-overriding: true

server:
  port: 8101
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

# redisson 配置
redisson:
  connectionPoolSize: 10
  connectionMinimumIdleSize: 1
  idleConnectionTimeout: 30000
  connectTimeout: 5000
  timeout: 3000
  retryAttempts: 3
  retryInterval: 1500

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      #      paths-to-match: '/**'
      packages-to-scan: com.rich.codeweaver.controller
      
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# actuator 端点配置
management:
  endpoints:
    web:
      exposure:
        # 暴露所有端点（包括 prometheus）
        include: '*'
  endpoint:
    health:
      # 显示详细健康信息
      show-details: always

mcp:
  enabled: false
  config-path: classpath:mcp-servers.json
  log-events: true
  fail-if-one-server-fails: false