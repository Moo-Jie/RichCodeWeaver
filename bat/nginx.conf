server
{
    listen 80;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    listen [::]:80;
    server_name rubyyan.cn www.rubyyan.cn;
    index index.php index.html index.htm default.php default.htm default.html;
    root /opt/RichCodeWeaver/web/;

    # 扩展配置路径
    include /www/server/panel/vhost/nginx/extension/www.rubyyan.cn/*.conf;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/www.rubyyan.cn.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START
    #error_page 404/404.html;
    ssl_certificate    /www/server/panel/vhost/cert/www.rubyyan.cn/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/www.rubyyan.cn/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START
    error_page 404 /404.html;
    #ERROR-PAGE-END

    #PHP-INFO-START
    include enable-php-80.conf;
    #PHP-INFO-END

    #REWRITE-START
    include /www/server/panel/vhost/rewrite/www.rubyyan.cn.conf;
    #REWRITE-END
    
    # 1. grafana 跨域配置
    location ^~ /grafana {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 3600s;
    }

    # 2. WebSocket 代理
    location ^~ /api/user/ws {
        proxy_pass http://127.0.0.1:8101;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # 3. 后端接口代理 8101端口
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_set_header Connection "";
    }

    # 4. userWeb 静态资源目录（AI 生成产物，文件内容会被 AI 修改，禁用强缓存）
    location ^~ /userWeb/ {
        alias /opt/RichCodeWeaver/server/cache/appCode/code_deploy/;
        try_files $uri $uri/ /index.html;
 
        # HTML 文件禁用缓存（入口文件必须每次重新获取）
        location ~* ^/userWeb/.*\.html$ {
            alias /opt/RichCodeWeaver/server/cache/appCode/code_deploy/;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }
 
        # JS/CSS/静态资源：短缓存 + 必须校验（AI 修改后下次请求即可获取新版本）
        location ~* ^/userWeb/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /opt/RichCodeWeaver/server/cache/appCode/code_deploy/;
            try_files $uri =404;
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
            access_log off;
       }
    }
    

    # 前端路由刷新不404（核心）
    location / {
        try_files $uri $uri/index.html /index.html;
    }

    # 基础安全规则
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    # SSL证书验证目录
    location ~ \.well-known{
        allow all;
    }

    # 敏感文件拦截
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # 增强安全规则
    location ~* (\.user.ini|\.htaccess|\.htpasswd|\.env.*|\.project|\.bashrc|\.bash_profile|\.bash_logout|\.DS_Store|\.gitignore|\.gitattributes|LICENSE|README\.md|CLAUDE\.md|CHANGELOG\.md|CHANGELOG|CONTRIBUTING\.md|TODO\.md|FAQ\.md|composer\.json|composer\.lock|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|\.\w+~|\.swp|\.swo|\.bak(up)?|\.old|\.tmp|\.temp|\.log|\.sql(\.gz)?|docker-compose\.yml|docker\.env|Dockerfile|\.csproj|\.sln|Cargo\.toml|Cargo\.lock|go\.mod|go\.sum|phpunit\.xml|phpunit\.xml|pom\.xml|build\.gradl|pyproject\.toml|requirements\.txt|application(-\w+)?\.(ya?ml|properties))$
    {
        return 404;
    }

    location ~* /(\.git|\.svn|\.bzr|\.vscode|\.claude|\.idea|\.ssh|\.github|\.npm|\.yarn|\.pnpm|\.cache|\.husky|\.turbo|\.next|\.nuxt|node_modules|runtime)/ {
        return 404;
    }

    # 普通静态资源缓存（排除 /api，避免把后端返回的 js/css 请求拦截掉）
    location ~* ^/(?!api/).*\.(js|css)$
    {
        expires      12h;
        error_log /dev/null;
        access_log /dev/null;
    }

    # 日志路径
    access_log  /www/wwwlogs/www.rubyyan.cn.log;
    error_log  /www/wwwlogs/www.rubyyan.cn.error.log;
}